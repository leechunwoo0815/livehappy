<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>写旅记 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a><a href="feed.html" class="nav-link active" data-auth-required>旅记</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="createNoteApp">
  <div class="container" style="max-width:640px">
    <a href="feed.html" class="btn btn-ghost btn-sm mb-4" style="color:var(--fg-secondary)">← 返回旅记广场</a>
    <h1 class="mb-6">写旅记</h1>

    <div id="createNoteError" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div id="createNoteSuccess" style="display:none" class="alert alert-success mb-4">
      <div><div style="font-weight:500">发布成功！</div></div>
    </div>

    <div class="card" id="createNoteForm">
      <div class="form-group">
        <label class="form-label">标题 <span style="color:var(--danger)">*</span></label>
        <input type="text" class="input" id="noteTitle" placeholder="给你的旅记起个标题">
      </div>
      <div class="form-group">
        <label class="form-label">内容 <span style="color:var(--danger)">*</span></label>
        <textarea class="input" id="noteContent" rows="10" placeholder="分享你的旅行故事..."></textarea>
      </div>
      <div class="flex gap-3 mt-6">
        <button class="btn btn-outline flex-1" onclick="history.back()">取消</button>
        <button class="btn btn-primary flex-1" id="noteSubmitBtn" onclick="submitNote()">发布</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
})

function submitNote() {
  var title = document.getElementById('noteTitle').value.trim()
  var content = document.getElementById('noteContent').value.trim()
  var errEl = document.getElementById('createNoteError')
  errEl.style.display = 'none'
  if (!title) { errEl.textContent = '请填写标题'; errEl.style.display = 'block'; return }
  if (!content) { errEl.textContent = '请填写内容'; errEl.style.display = 'block'; return }
  var btn = document.getElementById('noteSubmitBtn')
  btn.disabled = true; btn.textContent = '发布中...'
  apiClient.post('/social/notes', { title: title, content: content }).then(function () {
    btn.disabled = false; btn.textContent = '发布'
    document.getElementById('createNoteForm').style.display = 'none'
    document.getElementById('createNoteSuccess').style.display = 'block'
    setTimeout(function () { window.location.href = 'feed.html' }, 1500)
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = '发布'
    errEl.textContent = e.message; errEl.style.display = 'block'
  })
}
</script>
</body>
</html>
