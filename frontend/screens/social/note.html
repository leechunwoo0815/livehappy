<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>旅记详情 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.note-cover{width:100%;max-height:400px;object-fit:cover;border-radius:var(--radius-xl);margin-bottom:var(--space-6)}
.comment-item{padding:var(--space-4) 0;border-bottom:1px solid var(--border-light)}
.comment-item:last-child{border-bottom:none}
.comment-input-area{display:flex;gap:var(--space-3);align-items:flex-start}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a><a href="feed.html" class="nav-link" data-auth-required>旅记</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="noteApp">
  <div class="container" style="max-width:720px">
    <a href="feed.html" class="btn btn-ghost btn-sm mb-4" style="color:var(--fg-secondary)">← 返回旅记广场</a>
    <div id="noteError" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div id="noteLoading" class="text-center py-8" style="color:var(--fg-secondary);">加载中...</div>
    <div id="noteContent" style="display:none"></div>
  </div>
</div>

<script>
var noteState = { noteId: '', liked: false, liking: false }

document.addEventListener('DOMContentLoaded', function () {
  noteState.noteId = new URLSearchParams(location.search).get('id')
  if (!noteState.noteId) { showNoteError('缺少笔记 ID'); return }
  loadNote()
  loadComments()
})

function showNoteError(msg) {
  document.getElementById('noteLoading').style.display = 'none'
  var el = document.getElementById('noteError')
  el.textContent = msg; el.style.display = 'block'
}

function loadNote() {
  apiClient.get('/social/notes/' + noteState.noteId).then(function (note) {
    if (!note) return
    document.getElementById('noteLoading').style.display = 'none'
    var user = getUser()
    var html =
      '<div class="flex items-center gap-3 mb-4">' +
      '<div class="avatar avatar-md" style="background:var(--accent-subtle);color:var(--accent)">' + escapeHtml((note.user_id || 'U').charAt(0).toUpperCase()) + '</div>' +
      '<div><div style="font-weight:600">' + escapeHtml('用户' + (note.user_id || '').substring(0, 8)) + '</div>' +
      '<div style="font-size:0.8125rem;color:var(--fg-tertiary)">' + (note.created_at ? new Date(note.created_at).toLocaleString() : '') + '</div></div></div>' +
      '<img class="note-cover" src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=1200&q=85" alt="" loading="lazy">' +
      '<h1 style="font-size:clamp(1.35rem,2.5vw,1.75rem);margin-bottom:var(--space-4)">' + escapeHtml(note.title) + '</h1>' +
      '<div style="font-size:0.9375rem;line-height:1.8;color:var(--fg)">' + escapeHtml(note.content) + '</div>' +
      '<div class="flex items-center gap-4 mt-6 mb-8">' +
      '<button class="btn btn-ghost" id="likeBtn" onclick="likeNote()">♡ ' + (note.likes_count || 0) + '</button>' +
      '<span class="btn btn-ghost">💬 <span id="commentsCount">' + (note.comments_count || 0) + '</span></span></div>' +
      '<h3 class="mb-4">评论 · <span id="commentsTotal">0</span></h3>'
    if (user && loggedIn()) {
      html += '<div class="comment-input-area mb-6">' +
        '<div class="avatar avatar-sm" style="background:var(--accent-subtle);color:var(--accent)">' + escapeHtml((user.username || 'U').charAt(0).toUpperCase()) + '</div>' +
        '<div style="flex:1"><input type="text" class="input" id="commentInput" placeholder="写下你的评论..." onkeydown="if(event.key===\'Enter\')addComment()" style="border-radius:var(--radius-full)"></div>' +
        '<button class="btn btn-primary btn-sm" id="commentBtn" onclick="addComment()">发送</button></div>'
    }
    html += '<div id="commentsSection"></div>'
    document.getElementById('noteContent').innerHTML = html
    document.getElementById('noteContent').style.display = 'block'
  }).catch(function (e) {
    showNoteError(e.message || '加载笔记失败')
  })
}

function loadComments() {
  apiClient.get('/social/notes/' + noteState.noteId + '/comments').then(function (comments) {
    if (!comments) return
    var el = document.getElementById('commentsSection')
    if (!el) return
    document.getElementById('commentsTotal').textContent = comments.length
    if (comments.length === 0) {
      el.innerHTML = '<div class="text-center py-4" style="color:var(--fg-secondary)">暂无评论</div>'
      return
    }
    el.innerHTML = comments.map(function (c) {
      return '<div class="comment-item">' +
        '<div class="flex items-center gap-2 mb-1">' +
        '<div class="avatar avatar-sm" style="background:var(--accent-secondary-subtle);color:var(--accent-secondary)">' + escapeHtml((c.user_id || 'U').charAt(0).toUpperCase()) + '</div>' +
        '<div><div style="font-size:0.875rem;font-weight:500">' + escapeHtml('用户' + (c.user_id || '').substring(0, 6)) + '</div>' +
        '<div style="font-size:0.75rem;color:var(--fg-tertiary)">' + (c.created_at ? new Date(c.created_at).toLocaleString() : '') + '</div></div></div>' +
        '<p style="font-size:0.9375rem">' + escapeHtml(c.content) + '</p></div>'
    }).join('')
  }).catch(function () {})
}

function likeNote() {
  if (!requireAuth()) return
  if (noteState.liking) return
  noteState.liking = true
  var method = noteState.liked ? 'unlike' : 'like'
  apiClient.post('/social/notes/' + noteState.noteId + '/' + method, {}).then(function () {
    noteState.liking = false
    noteState.liked = !noteState.liked
    var btn = document.getElementById('likeBtn')
    if (btn) {
      var current = parseInt(btn.textContent.match(/\d+/)[0]) || 0
      btn.innerHTML = (noteState.liked ? '❤️' : '♡') + ' ' + (current + (noteState.liked ? 1 : -1))
    }
  }).catch(function () { noteState.liking = false })
}

function addComment() {
  var input = document.getElementById('commentInput')
  var text = input.value.trim()
  if (!text) return
  var btn = document.getElementById('commentBtn')
  btn.disabled = true
  apiClient.post('/social/notes/' + noteState.noteId + '/comments?content=' + encodeURIComponent(text), {}).then(function () {
    btn.disabled = false
    input.value = ''
    loadComments()
    var cc = document.getElementById('commentsCount')
    if (cc) cc.textContent = parseInt(cc.textContent) + 1
  }).catch(function () {
    btn.disabled = false
    alert('评论发送失败')
  })
}
</script>
</body>
</html>
