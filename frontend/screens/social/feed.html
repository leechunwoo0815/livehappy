<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>旅记广场 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.note-card{border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;background:var(--surface);transition:all var(--transition-base)}
.note-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.note-card-image{aspect-ratio:16/10;overflow:hidden;background:var(--surface-hover)}
.note-card-image img{width:100%;height:100%;object-fit:cover}
.note-card-body{padding:var(--space-5)}
.note-card-author{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3)}
.note-card-title{font-size:1.0625rem;font-weight:600;margin-bottom:var(--space-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-card-text{font-size:0.9375rem;color:var(--fg-secondary);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}
.note-card-actions{display:flex;gap:var(--space-4);margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--border-light);font-size:0.875rem;color:var(--fg-tertiary)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="feed.html" class="nav-link active" data-auth-required>旅记</a>
      <a href="/screens/messages/list.html" class="nav-link" data-auth-required>消息</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="feedApp">
  <div class="container">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1>旅记广场</h1>
        <p style="font-size:0.9375rem;color:var(--fg-secondary)">分享你的旅行故事，发现更多精彩</p>
      </div>
      <button class="btn btn-primary" id="createNoteBtn" style="display:none" onclick="window.location.href='/screens/social/create.html'">写旅记</button>
    </div>
    <div id="feedLoading" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>
    <div id="feedEmpty" class="text-center py-8" style="color:var(--fg-secondary);display:none">
      <p style="font-size:2rem;margin-bottom:var(--space-2)">📝</p>
      <p>还没有旅记</p>
    </div>
    <div class="grid grid-cols-3 gap-5" id="feedList"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (loggedIn()) document.getElementById('createNoteBtn').style.display = 'inline-flex'
  apiClient.get('/social/notes').then(function (data) {
    document.getElementById('feedLoading').style.display = 'none'
    if (!data) return
    var notes = data.items || data
    if (!notes || notes.length === 0) { document.getElementById('feedEmpty').style.display = 'block'; return }
    var html = notes.map(function (note) {
      return '<div class="note-card fade-in">' +
        '<a href="note.html?id=' + note.id + '" style="text-decoration:none;color:inherit">' +
        '<div class="note-card-image"><img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=600&q=80" alt="" loading="lazy"></div>' +
        '<div class="note-card-body">' +
        '<div class="note-card-author">' +
        '<div class="avatar avatar-sm" style="background:var(--accent-subtle);color:var(--accent)">' + escapeHtml((note.user_id || 'U').charAt(0).toUpperCase()) + '</div>' +
        '<div><div style="font-size:0.875rem;font-weight:500">' + escapeHtml('用户' + (note.user_id || '').substring(0, 6)) + '</div>' +
        '<div style="font-size:0.75rem;color:var(--fg-tertiary)">' + (note.created_at ? new Date(note.created_at).toLocaleDateString() : '') + '</div></div></div>' +
        '<div class="note-card-title">' + escapeHtml(note.title) + '</div>' +
        '<div class="note-card-text">' + escapeHtml(note.content) + '</div>' +
        '<div class="note-card-actions"><span>♡ ' + (note.likes_count || 0) + '</span><span>💬 ' + (note.comments_count || 0) + '</span></div>' +
        '</div></a></div>'
    }).join('')
    document.getElementById('feedList').innerHTML = html
  }).catch(function () {
    document.getElementById('feedLoading').style.display = 'none'
  })
})
</script>
</body>
</html>
