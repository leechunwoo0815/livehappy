<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>预订确认 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.confirm-card{max-width:560px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-8);text-align:center}
.confirm-icon{font-size:3rem;margin-bottom:var(--space-4)}
.confirm-detail{text-align:left;margin-top:var(--space-6)}
.confirm-row{display:flex;justify-content:space-between;padding:var(--space-3) 0;border-bottom:1px solid var(--border);font-size:0.875rem}
.confirm-row:last-child{border-bottom:0}
.confirm-total{font-size:1.25rem;font-weight:700;color:var(--accent)}
</style>
</head>
<body>
<div class="container page" x-data="confirmApp()" x-init="init()">
  <div x-show="!loaded" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>

  <template x-if="loaded && booking">
    <div class="confirm-card">
      <div class="confirm-icon">🎉</div>
      <h2>预订成功！</h2>
      <p style="color:var(--fg-secondary);font-size:0.875rem">订单已提交，等待房东确认</p>

      <div class="confirm-detail">
        <div class="confirm-row"><span>订单编号</span><span x-text="booking.id"></span></div>
        <div class="confirm-row"><span>入住日期</span><span x-text="booking.check_in"></span></div>
        <div class="confirm-row"><span>离店日期</span><span x-text="booking.check_out"></span></div>
        <div class="confirm-row"><span>住客人数</span><span x-text="booking.guests"></span></div>
        <div class="confirm-row"><span>订单状态</span><span class="badge" :class="'badge-' + booking.status" x-text="statusLabel(booking.status)"></span></div>
        <div class="confirm-row confirm-total"><span>总金额</span><span>¥<span x-text="booking.total_price"></span></span></div>
      </div>

      <div style="margin-top:var(--space-6)">
        <a href="/screens/bookings/list.html" class="btn btn-primary">查看所有订单</a>
        <a href="/screens/listings/search.html" class="btn btn-outline" style="margin-left:var(--space-2)">继续搜索</a>
      </div>
    </div>
  </template>
</div>

<script>
function confirmApp() {
  return {
    booking: null,
    loaded: false,
    statusLabel(s) { return {pending:'待付款',paid:'已支付',confirmed:'已确认',cancelled:'已取消'}[s] || s },
    async init() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;
      const res = await api('/api/bookings/' + id);
      if (res.ok) { this.booking = await res.json(); this.loaded = true }
    }
  }
}
</script>
</body>
</html>
