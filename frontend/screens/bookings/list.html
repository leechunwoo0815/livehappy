<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的订单 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.booking-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);background:var(--surface);margin-bottom:var(--space-4);display:flex;gap:var(--space-4)}
.booking-card:hover{box-shadow:var(--shadow-sm)}
.booking-card img{width:120px;height:90px;object-fit:cover;border-radius:var(--radius-md)}
.booking-card-body{flex:1}
.booking-card-title{font-weight:600;margin-bottom:var(--space-1)}
.booking-card-title a{color:var(--fg);text-decoration:none}
.booking-card-meta{font-size:0.8125rem;color:var(--fg-secondary)}
.badge{padding:2px 10px;border-radius:var(--radius-full);font-size:0.75rem;font-weight:500}
.badge-pending{background:var(--warning-subtle);color:var(--warning)}
.badge-paid{background:var(--info-subtle);color:var(--info)}
.badge-confirmed{background:var(--success-subtle);color:var(--success)}
.badge-cancelled{background:var(--danger-subtle);color:var(--danger)}
</style>
</head>
<body>
<nav class="nav" x-data>
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link active">我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()">...</button>
      <template x-if="!$store.auth.loggedIn"><a href="/screens/auth/login.html" class="btn btn-outline btn-sm">登录</a></template>
      <template x-if="$store.auth.loggedIn">
        <div class="flex items-center gap-2">
          <a href="/screens/users/profile.html" class="btn btn-ghost btn-sm" x-text="$store.auth.username"></a>
          <button class="btn btn-outline btn-sm" @click="$store.auth.logout()">退出</button>
        </div>
      </template>
    </div>
  </div>
</nav>

<div class="container page" x-data="bookingsApp()" x-init="init()">
  <h2 class="mb-6">我的订单</h2>

  <div x-show="!loaded" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>

  <div x-show="loaded && bookings.length === 0" class="text-center py-8" style="color:var(--fg-secondary)">
    <p style="font-size:2rem;margin-bottom:var(--space-2)">📋</p>
    <p>还没有订单</p>
    <a href="/screens/listings/search.html" class="btn btn-primary btn-sm" style="margin-top:var(--space-3)">去预订</a>
  </div>

  <template x-for="booking in bookings" :key="booking.id">
    <div class="booking-card">
      <img :src="booking.listing_cover || 'https://placehold.co/120x90/e2e8f0/64748b?text=No+Image'">
      <div class="booking-card-body">
        <div class="booking-card-title">
          <a :href="'/screens/bookings/detail.html?id=' + booking.id" x-text="booking.listing_title || '房源 #' + booking.listing_id"></a>
        </div>
        <div class="booking-card-meta">
          <span x-text="booking.check_in + ' → ' + booking.check_out"></span>
          <span style="margin-left:var(--space-3)">¥<span x-text="booking.total_price"></span></span>
        </div>
        <div style="margin-top:var(--space-2)">
          <span class="badge" :class="'badge-' + booking.status" x-text="statusLabel(booking.status)"></span>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function bookingsApp() {
  return {
    bookings: [],
    loaded: false,
    statusLabel(s) { return {pending:'待付款',paid:'已支付',confirmed:'已确认',cancelled:'已取消'}[s] || s },
    async init() {
      if (!$store.auth.loggedIn) { window.location.href = '/screens/auth/login.html?next=' + encodeURIComponent(location.pathname); return }
      const res = await api('/api/bookings');
      if (res.ok) { this.bookings = await res.json(); this.loaded = true }
    }
  }
}
</script>
</body>
</html>
