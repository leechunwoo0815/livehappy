<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的订单 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.booking-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);background:var(--surface);margin-bottom:var(--space-4);display:flex;gap:var(--space-4)}
.booking-card:hover{box-shadow:var(--shadow-sm)}
.booking-card img{width:120px;height:90px;object-fit:cover;border-radius:var(--radius-md)}
.booking-card-body{flex:1}
.booking-card-title{font-weight:600;margin-bottom:var(--space-1)}
.booking-card-title a{color:var(--fg);text-decoration:none}
.booking-card-meta{font-size:0.8125rem;color:var(--fg-secondary)}
.badge{padding:2px 10px;border-radius:var(--radius-full);font-size:0.75rem;font-weight:500}
.badge-pending{background:var(--warning-subtle);color:var(--warning)}
.badge-paid{background:var(--info-subtle);color:var(--info)}
.badge-confirmed{background:var(--success-subtle);color:var(--success)}
.badge-cancelled{background:var(--danger-subtle);color:var(--danger)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link active" data-auth-required>我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="container page" id="bookingsApp">
  <h2 class="mb-6">我的订单</h2>
  <div id="bookingsLoading" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>
  <div id="bookingsEmpty" class="text-center py-8" style="color:var(--fg-secondary);display:none">
    <p style="font-size:2rem;margin-bottom:var(--space-2)">📋</p>
    <p>还没有订单</p>
    <a href="/screens/listings/search.html" class="btn btn-primary btn-sm" style="margin-top:var(--space-3)">去预订</a>
  </div>
  <div id="bookingsList"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
  apiClient.get('/bookings/').then(function (bookings) {
    document.getElementById('bookingsLoading').style.display = 'none'
    if (!bookings || bookings.length === 0) {
      document.getElementById('bookingsEmpty').style.display = 'block'
      return
    }
    var html = bookings.map(function (b) {
      return '<div class="booking-card">' +
        '<img src="' + NO_IMAGE_URL + '" alt="" style="width:120px;height:90px;object-fit:cover;border-radius:var(--radius-md);background:var(--surface-hover)">' +
        '<div class="booking-card-body">' +
        '<div class="booking-card-title"><a href="/screens/bookings/detail.html?id=' + b.id + '">订单 #' + escapeHtml(b.id.substring(0, 8)) + '</a></div>' +
        '<div class="booking-card-meta">' +
        '<span>' + escapeHtml(b.check_in) + ' → ' + escapeHtml(b.check_out) + '</span>' +
        '<span style="margin-left:var(--space-3)">¥' + (b.total_price || '') + '</span>' +
        '</div>' +
        '<div style="margin-top:var(--space-2)"><span class="badge badge-' + b.status + '">' + statusLabel(b.status) + '</span></div>' +
        '</div></div>'
    }).join('')
    document.getElementById('bookingsList').innerHTML = html
  }).catch(function (e) {
    document.getElementById('bookingsLoading').style.display = 'none'
    document.getElementById('bookingsList').innerHTML = '<div class="text-center py-8" style="color:var(--danger)">' + escapeHtml(translateError(e.message)) + '</div>'
  })
})
</script>
</body>
</html>
