<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>订单详情 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.detail-card{max-width:600px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-8)}
.detail-row{display:flex;justify-content:space-between;padding:var(--space-3) 0;border-bottom:1px solid var(--border);font-size:0.875rem}
.detail-row:last-child{border-bottom:0}
.badge{padding:2px 10px;border-radius:var(--radius-full);font-size:0.75rem;font-weight:500}
.badge-pending{background:var(--warning-subtle);color:var(--warning)}
.badge-paid{background:var(--info-subtle);color:var(--info)}
.badge-confirmed{background:var(--success-subtle);color:var(--success)}
.badge-cancelled{background:var(--danger-subtle);color:var(--danger)}
</style>
</head>
<body>
<div class="container page" x-data="detailApp()" x-init="init()">
  <div x-show="!loaded" class="text-center py-8">加载中...</div>

  <template x-if="loaded && booking">
    <div class="detail-card">
      <h2>订单详情</h2>
      <div class="detail-row"><span>订单编号</span><span x-text="booking.id" style="font-size:0.8125rem"></span></div>
      <div class="detail-row"><span>房源</span><span x-text="booking.listing_title || ('#' + booking.listing_id)"></span></div>
      <div class="detail-row"><span>入住</span><span x-text="booking.check_in"></span></div>
      <div class="detail-row"><span>离店</span><span x-text="booking.check_out"></span></div>
      <div class="detail-row"><span>住客</span><span x-text="booking.guests">人</span></div>
      <div class="detail-row"><span>状态</span><span class="badge" :class="'badge-' + booking.status" x-text="statusLabel(booking.status)"></span></div>
      <div class="detail-row"><span>总金额</span><span style="font-weight:700;color:var(--accent)">¥<span x-text="booking.total_price"></span></span></div>
      <div x-show="booking.cancel_reason" class="detail-row"><span>取消原因</span><span x-text="booking.cancel_reason" style="color:var(--danger)"></span></div>

      <div style="margin-top:var(--space-6);display:flex;gap:var(--space-3)">
        <a :href="'/screens/listings/detail.html?id=' + booking.listing_id" class="btn btn-outline">查看房源</a>
        <button x-show="booking.status === 'pending'" class="btn btn-danger" @click="cancelBooking()" :disabled="cancelling" x-text="cancelling ? '取消中...' : '取消订单'"></button>
      </div>
    </div>
  </template>
</div>

<script>
function detailApp() {
  return {
    booking: null,
    loaded: false,
    cancelling: false,
    statusLabel(s) { return {pending:'待付款',paid:'已支付',confirmed:'已确认',cancelled:'已取消'}[s] || s },
    async init() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;
      const res = await api('/api/bookings/' + id);
      if (res.ok) { this.booking = await res.json(); this.loaded = true }
    },
    async cancelBooking() {
      if (!confirm('确定要取消这个订单吗？')) return;
      this.cancelling = true;
      const res = await api('/api/bookings/' + this.booking.id + '/cancel', { method: 'POST', body: '{}' });
      if (res.ok) { this.booking = await res.json() }
      else { alert('取消失败') }
      this.cancelling = false;
    }
  }
}
</script>
</body>
</html>
