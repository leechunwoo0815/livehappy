<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>写评价 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.star-input{display:flex;gap:var(--space-1);flex-direction:row-reverse;justify-content:flex-end}
.star-input button{font-size:2rem;line-height:1;color:var(--border);transition:color var(--transition-fast);padding:0;background:none;cursor:pointer;border:none}
.star-input button:hover,.star-input button:hover~button,.star-input button.selected,.star-input button.selected~button{color:var(--warning)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a><a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="writeReviewApp">
  <div class="container" style="max-width:560px">
    <a href="#" class="btn btn-ghost btn-sm mb-4" style="color:var(--fg-secondary)" onclick="history.back();return false">← 返回</a>
    <h1 class="mb-2">写评价</h1>
    <p style="font-size:0.9375rem;color:var(--fg-secondary);margin-bottom:var(--space-6)">分享你的住宿体验</p>

    <div id="reviewSuccess" style="display:none" class="alert alert-success mb-4">
      <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div><div style="font-weight:500">评价提交成功！</div></div>
    </div>

    <div id="reviewError" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>

    <div class="card" id="reviewForm">
      <div class="form-group">
        <label class="form-label">评分 <span style="color:var(--danger)">*</span></label>
        <div class="star-input" id="starInput">
          <button type="button" data-star="5" onclick="setStar(5)">★</button>
          <button type="button" data-star="4" onclick="setStar(4)">★</button>
          <button type="button" data-star="3" onclick="setStar(3)">★</button>
          <button type="button" data-star="2" onclick="setStar(2)">★</button>
          <button type="button" data-star="1" onclick="setStar(1)">★</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">评价内容 <span style="color:var(--danger)">*</span></label>
        <textarea class="input" id="reviewContent" rows="6" placeholder="分享你的住宿体验..."></textarea>
      </div>

      <div class="flex gap-3 mt-6">
        <button class="btn btn-outline flex-1" onclick="history.back()">取消</button>
        <button class="btn btn-primary flex-1" id="reviewSubmitBtn" onclick="submitReview()">提交评价</button>
      </div>
    </div>
  </div>
</div>

<script>
var reviewState = { rating: 0 }

function setStar(n) {
  reviewState.rating = n
  document.querySelectorAll('#starInput button').forEach(function (b) {
    b.classList.toggle('selected', parseInt(b.dataset.star) <= n)
  })
}

function submitReview() {
  if (!requireAuth()) return
  var errEl = document.getElementById('reviewError')
  errEl.style.display = 'none'
  if (!reviewState.rating) { errEl.textContent = '请选择评分'; errEl.style.display = 'block'; return }
  var content = document.getElementById('reviewContent').value.trim()
  if (!content) { errEl.textContent = '请填写评价内容'; errEl.style.display = 'block'; return }
  var listingId = new URLSearchParams(location.search).get('listing_id')
  var bookingId = new URLSearchParams(location.search).get('booking_id')
  if (!listingId || !bookingId) { errEl.textContent = '缺少房源或订单信息'; errEl.style.display = 'block'; return }
  var btn = document.getElementById('reviewSubmitBtn')
  btn.disabled = true; btn.textContent = '提交中...'
  var params = new URLSearchParams({ listing_id: listingId, booking_id: bookingId, rating: reviewState.rating })
  if (content) params.set('content', content)
  apiClient.post('/reviews/?' + params.toString(), {}).then(function () {
    btn.disabled = false; btn.textContent = '提交评价'
    document.getElementById('reviewForm').style.display = 'none'; document.getElementById('reviewSuccess').style.display = 'block'
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = '提交评价'
    errEl.textContent = e.message; errEl.style.display = 'block'
  })
}

document.addEventListener('DOMContentLoaded', function () {
  if (!new URLSearchParams(location.search).get('listing_id')) {
    document.getElementById('reviewError').textContent = '请从订单页面进入评价'
    document.getElementById('reviewError').style.display = 'block'
  }
})
</script>
</body>
</html>
