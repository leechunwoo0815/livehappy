<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>评价列表 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.review-summary{display:flex;gap:var(--space-8);padding:var(--space-6);border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--surface);margin-bottom:var(--space-6)}
@media(max-width:640px){.review-summary{flex-direction:column;gap:var(--space-4)}}
.rating-big{font-size:3.5rem;font-weight:600;line-height:1}
.stars{display:flex;gap:2px}
.stars svg{width:16px;height:16px;color:var(--warning)}
.review-item{padding:var(--space-5) 0;border-bottom:1px solid var(--border-light)}
.review-item:last-child{border-bottom:none}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a><a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="reviewsApp">
  <div class="container" style="max-width:720px">
    <h1 class="mb-6">评价</h1>
    <div id="reviewsLoading" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>
    <div id="reviewsEmpty" class="text-center py-8" style="color:var(--fg-secondary);display:none"><p>暂无评价</p></div>
    <div id="reviewsContent" style="display:none"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var listingId = new URLSearchParams(location.search).get('listing_id')
  if (!listingId) { document.getElementById('reviewsLoading').style.display = 'none'; document.getElementById('reviewsEmpty').style.display = 'block'; return }
  apiClient.get('/reviews/listing/' + listingId).then(function (reviews) {
    document.getElementById('reviewsLoading').style.display = 'none'
    if (!reviews || reviews.length === 0) { document.getElementById('reviewsEmpty').style.display = 'block'; return }
    var avg = (reviews.reduce(function (s, r) { return s + r.rating }, 0) / reviews.length).toFixed(1)
    var starSvg = function (filled) {
      return '<svg viewBox="0 0 24 24" fill="' + (filled ? 'currentColor' : 'none') + '" stroke="' + (filled ? 'currentColor' : 'var(--border)') + '" stroke-width="2" style="width:16px;height:16px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
    }
    var starsHtml = ''
    for (var i = 1; i <= 5; i++) starsHtml += starSvg(i <= Math.round(avg))
    var html = '<div class="review-summary fade-in"><div class="text-center" style="min-width:100px">' +
      '<div class="rating-big">' + avg + '</div>' +
      '<div class="stars mt-2" style="justify-content:center">' + starsHtml + '</div>' +
      '<div style="font-size:0.875rem;color:var(--fg-secondary);margin-top:var(--space-1)">' + reviews.length + ' 条评价</div></div></div>'
    reviews.forEach(function (review) {
      var s = ''
      for (var j = 1; j <= 5; j++) s += starSvg(j <= review.rating)
      html += '<div class="review-item">' +
        '<div class="flex items-center gap-3 mb-2">' +
        '<div class="avatar avatar-sm" style="background:var(--accent-subtle);color:var(--accent)">' + escapeHtml((review.user_id || 'U').charAt(0).toUpperCase()) + '</div>' +
        '<div><div style="font-weight:500;font-size:0.9375rem">' + escapeHtml('用户' + (review.user_id || '').substring(0, 6)) + '</div>' +
        '<div style="font-size:0.8125rem;color:var(--fg-tertiary)">' + (review.created_at ? new Date(review.created_at).toLocaleDateString() : '') + '</div></div>' +
        '<div class="stars ml-auto">' + s + '</div></div>' +
        '<p style="font-size:0.9375rem">' + escapeHtml(review.content || '无评价内容') + '</p>'
      if (review.reply) {
        html += '<div style="margin-top:var(--space-3);padding:var(--space-3);background:var(--surface-hover);border-radius:var(--radius-md);border-left:3px solid var(--accent)">' +
          '<div style="font-size:0.8125rem;font-weight:500;color:var(--accent)">房东回复</div>' +
          '<p style="font-size:0.875rem;color:var(--fg-secondary);margin-top:var(--space-1)">' + escapeHtml(review.reply) + '</p></div>'
      }
      html += '</div>'
    })
    document.getElementById('reviewsContent').innerHTML = html
    document.getElementById('reviewsContent').style.display = 'block'
  }).catch(function () {
    document.getElementById('reviewsLoading').style.display = 'none'
  })
})
</script>
</body>
</html>
