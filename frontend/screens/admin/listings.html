<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>房源管理 — 开心住 LiveHappy 管理后台</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - var(--nav-height));padding-top:var(--nav-height)}
@media(max-width:1023px){.admin-layout{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:var(--space-4)}
@media(max-width:1023px){.sidebar{display:none}}
.sidebar-item{display:flex;align-items:center;gap:var(--space-3);padding:10px 12px;border-radius:var(--radius-md);font-size:0.9375rem;color:var(--fg-secondary);transition:all var(--transition-fast);cursor:pointer}
.sidebar-item:hover{background:var(--surface-hover);color:var(--fg)}
.sidebar-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:500}
.sidebar-item svg{width:20px;height:20px}
.admin-main{padding:var(--space-8);overflow-y:auto}
@media(max-width:640px){.admin-main{padding:var(--space-4)}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);cursor:pointer">管</div>
    </div>
  </div>
</nav>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-item" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      仪表盘
    </div>
    <div class="sidebar-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      房源管理
    </div>
    <div class="sidebar-item" onclick="window.location.href='users.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>
      用户管理
    </div>
  </aside>
  <main class="admin-main">
    <div class="flex items-center justify-between mb-6"><h1>房源管理</h1></div>
    <div id="errorMsg" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="all" onclick="switchTab('all')">全部</button>
      <button class="tab" data-tab="pending" onclick="switchTab('pending')">待审核</button>
      <button class="tab" data-tab="approved" onclick="switchTab('approved')">已上架</button>
      <button class="tab" data-tab="rejected" onclick="switchTab('rejected')">已拒绝</button>
    </div>
    <div class="card p-0">
      <div class="table-wrap" style="border:none">
        <table>
          <thead><tr><th>房源</th><th>城市</th><th>价格</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="listingTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="flex items-center justify-between mt-4">
      <span class="text-small" id="paginationInfo"></span>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm" id="prevBtn" onclick="prevPage()" disabled>上一页</button>
        <button class="btn btn-primary btn-sm" id="pageBtn">1</button>
        <button class="btn btn-outline btn-sm" id="nextBtn" onclick="nextPage()" disabled>下一页</button>
      </div>
    </div>
  </main>
</div>
<div id="editModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--radius-xl);padding:var(--space-6);width:90%;max-width:480px">
    <h3 style="margin-bottom:var(--space-4)">编辑房源</h3>
    <div class="field"><label class="field-label">标题</label><input class="input" id="editTitle" type="text" placeholder="请输入房源标题"></div>
    <div class="field"><label class="field-label">城市</label><input class="input" id="editCity" type="text" placeholder="请输入城市"></div>
    <div class="field"><label class="field-label">价格（¥/晚）</label><input class="input" id="editPrice" type="number" min="0" placeholder="每晚价格"></div>
    <div id="editError" style="display:none;padding:var(--space-2);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-3)"></div>
    <div class="flex gap-2" style="justify-content:flex-end;margin-top:var(--space-4)">
      <button class="btn btn-outline" onclick="closeEdit()">取消</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>
<script>
let editingId = null;
let listState = { page: 1, status: '', total: 0 };

async function loadListings() {
  const s = listState.status || '';
  let r;
  try {
    r = await apiClient.get('/admin/listings?page=' + listState.page + '&size=20' + (s ? '&status=' + s : ''));
  } catch (e) {
    showError(translateError(e.message) || '加载失败，请刷新重试');
    r = { items: [], total: 0 };
  }
  listState.total = r.total || 0;
  const tb = document.getElementById('listingTableBody');
  tb.innerHTML = r.items.map(function (item) {
    var statusHtml = '<span class="badge' + (item.status === 'approved' ? ' badge-success' : item.status === 'pending' ? ' badge-warning' : ' badge-danger') + '">' + statusLabel(item.status) + '</span>';
    var actionHtml = item.status === 'pending'
      ? '<button class="btn btn-primary btn-sm" style="font-size:0.75rem;padding:4px 10px" onclick="approveItem(\'' + item.id + '\',\'approve\')">通过</button> <button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:4px 10px" onclick="approveItem(\'' + item.id + '\',\'reject\')">拒绝</button>'
      : '<button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:4px 10px" onclick="editItem(\'' + item.id + '\',\'' + escapeHtml(item.title) + '\',\'' + escapeHtml(item.city) + '\',' + item.price_per_night + ')">编辑</button> <button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:4px 10px;color:var(--danger)" onclick="deleteItem(\'' + item.id + '\')">删除</button>';
    return '<tr><td><div style="font-weight:500">' + escapeHtml(item.title) + '</div></td><td>' + escapeHtml(item.city) + '</td><td>¥' + item.price_per_night + '</td><td>' + statusHtml + '</td><td>' + actionHtml + '</td></tr>';
  }).join('');
  if (!r.items || r.items.length === 0) {
    tb.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:var(--space-8);color:var(--fg-tertiary)">暂无数据</td></tr>';
  }
  document.getElementById('paginationInfo').textContent = '共 ' + listState.total + ' 条';
  document.getElementById('prevBtn').disabled = listState.page <= 1;
  document.getElementById('nextBtn').disabled = listState.page * 20 >= listState.total;
  document.getElementById('pageBtn').textContent = listState.page;
}
function switchTab(s) {
  listState.status = s === 'all' ? '' : s;
  listState.page = 1;
  document.querySelectorAll('#tabs .tab').forEach(function (t) { t.classList.toggle('active', t.dataset.tab === s) });
  loadListings();
}
function prevPage() { if (listState.page > 1) { listState.page--; loadListings() } }
function nextPage() { if (listState.page * 20 < listState.total) { listState.page++; loadListings() } }
function showError(m) { var e = document.getElementById('errorMsg'); e.textContent = m; e.style.display = ''; }
async function approveItem(id, action) {
  try {
    await apiClient.post('/listings/' + id + '/approve', { action });
    loadListings();
  } catch (e) {
    showError('操作失败');
  }
}
function editItem(id, title, city, price) {
  editingId = id;
  document.getElementById('editTitle').value = title;
  document.getElementById('editCity').value = city;
  document.getElementById('editPrice').value = price;
  document.getElementById('editModal').style.display = 'flex';
  document.getElementById('editError').style.display = 'none';
}
function closeEdit() { document.getElementById('editModal').style.display = 'none'; editingId = null; }
async function saveEdit() {
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  const err = document.getElementById('editError');
  const data = { title: document.getElementById('editTitle').value, city: document.getElementById('editCity').value, price_per_night: parseFloat(document.getElementById('editPrice').value) };
  try {
    await apiClient.put('/listings/' + editingId, data);
    closeEdit(); loadListings();
  } catch (e) {
    err.textContent = translateError(e.message) || '保存失败，请重试';
    err.style.display = '';
  }
  btn.disabled = false; btn.textContent = '保存';
}
async function deleteItem(id) {
  if (!confirm('确定要删除这个房源吗？')) return;
  try {
    await apiClient.delete('/listings/' + id);
    loadListings();
  } catch (e) {
    showError('删除失败');
  }
}
document.addEventListener('DOMContentLoaded', loadListings);
</script>
</body>
</html>
