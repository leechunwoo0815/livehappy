<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.admin-layout{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:calc(100vh - var(--nav-height));padding-top:var(--nav-height)}
@media(max-width:1023px){.admin-layout{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:var(--space-4)}
@media(max-width:1023px){.sidebar{display:none}}
.sidebar-item{display:flex;align-items:center;gap:var(--space-3);padding:10px 12px;border-radius:var(--radius-md);font-size:0.9375rem;color:var(--fg-secondary);transition:all var(--transition-fast);cursor:pointer}
.sidebar-item:hover{background:var(--surface-hover);color:var(--fg)}
.sidebar-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:500}
.sidebar-item svg{width:20px;height:20px}
.admin-main{padding:var(--space-8);overflow-y:auto}
@media(max-width:640px){.admin-main{padding:var(--space-4)}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);cursor:pointer">管</div>
    </div>
  </div>
</nav>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      仪表盘
    </div>
    <div class="sidebar-item" onclick="window.location.href='listings.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      房源管理
      <span class="badge badge-warning" style="margin-left:auto;font-size:0.6875rem;padding:1px 6px" id="pendingBadge"></span>
    </div>
    <div class="sidebar-item" onclick="window.location.href='users.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>
      用户管理
    </div>
    <div class="sidebar-item" onclick="window.location.href='../../index.html'" style="color:var(--fg-tertiary)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      返回前台
    </div>
  </aside>
  <main class="admin-main">
    <div class="flex items-center justify-between mb-6"><h1>仪表盘</h1></div>
    <div class="grid grid-cols-4 gap-4 mb-8" id="statCards">
      <div class="stat-card"><div class="stat-card-value" id="statUsers">...</div><div class="stat-card-label">注册用户</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statListings">...</div><div class="stat-card-label">活跃房源</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statRevenue">...</div><div class="stat-card-label">交易总额</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statBookings">...</div><div class="stat-card-label">总订单数</div></div>
    </div>
    <div id="errorMsg" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div class="card" id="pendingSection" style="display:none">
      <h4 class="mb-4">待审核房源</h4>
      <div style="display:flex;flex-direction:column;gap:var(--space-3)" id="pendingList"></div>
      <a href="listings.html?status=pending" class="btn btn-ghost btn-sm mt-3 w-full" style="justify-content:center">查看全部 →</a>
    </div>
  </main>
</div>
<script>
async function loadDashboard() {
  try {
    const [stats, pendingData] = await Promise.all([
      apiClient.get('/admin/stats'),
      apiClient.get('/admin/listings?status=pending&size=5')
    ]);
    document.getElementById('statUsers').textContent = (stats.total_users || 0).toLocaleString();
    document.getElementById('statListings').textContent = (stats.total_listings || 0).toLocaleString();
    document.getElementById('statRevenue').textContent = '¥' + (Math.round(stats.revenue || 0)).toLocaleString();
    document.getElementById('statBookings').textContent = (stats.total_bookings || 0).toLocaleString();
    document.getElementById('pendingBadge').textContent = stats.pending_listings || '';
    const items = pendingData.items || [];
    if (items.length > 0) {
      document.getElementById('pendingSection').style.display = '';
      const container = document.getElementById('pendingList');
      container.innerHTML = '';
      for (const item of items) {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between p-3';
        div.style.cssText = 'border:1px solid var(--border-light);border-radius:var(--radius-md)';
        div.innerHTML = '<div><div style="font-size:0.875rem;font-weight:500">' + escapeHtml(item.title) + '</div><div style="font-size:0.75rem;color:var(--fg-tertiary)">' + escapeHtml(item.city) + ' · ¥' + item.price_per_night + '/晚</div></div>'
          + '<div class="flex gap-2">'
          + '<button class="btn btn-primary btn-sm" style="font-size:0.75rem;padding:4px 12px" onclick="approveListing(\'' + item.id + '\',\'approve\')">通过</button>'
          + '<button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:4px 12px" onclick="approveListing(\'' + item.id + '\',\'reject\')">拒绝</button>'
          + '</div>';
        container.appendChild(div);
      }
    }
  } catch (e) {}
}
async function approveListing(id, action) {
  try {
    await apiClient.post('/listings/' + id + '/approve', { action });
    loadDashboard();
  } catch (e) {
    const err = document.getElementById('errorMsg'); err.textContent = '操作失败'; err.style.display = '';
  }
}
document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
