<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户管理 — 开心住 LiveHappy 管理后台</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - var(--nav-height));padding-top:var(--nav-height)}
@media(max-width:1023px){.admin-layout{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:var(--space-4)}
@media(max-width:1023px){.sidebar{display:none}}
.sidebar-item{display:flex;align-items:center;gap:var(--space-3);padding:10px 12px;border-radius:var(--radius-md);font-size:0.9375rem;color:var(--fg-secondary);transition:all var(--transition-fast);cursor:pointer}
.sidebar-item:hover{background:var(--surface-hover);color:var(--fg)}
.sidebar-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:500}
.sidebar-item svg{width:20px;height:20px}
.admin-main{padding:var(--space-8);overflow-y:auto}
@media(max-width:640px){.admin-main{padding:var(--space-4)}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="/screens/listings/search.html" class="nav-link">搜索房源</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);cursor:pointer">管</div>
    </div>
  </div>
</nav>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-item" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      仪表盘
    </div>
    <div class="sidebar-item" onclick="window.location.href='listings.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      房源管理
    </div>
    <div class="sidebar-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>
      用户管理
    </div>
  </aside>
  <main class="admin-main">
    <div class="flex items-center justify-between mb-6">
      <h1>用户管理</h1>
      <select class="input" style="width:auto;font-size:0.875rem;padding:6px 30px 6px 12px" id="roleFilter" onchange="switchRole()">
        <option value="">全部用户</option>
        <option value="user">普通用户</option>
        <option value="host">房东</option>
        <option value="admin">管理员</option>
      </select>
    </div>
    <div id="errorMsg" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div class="card p-0">
      <div class="table-wrap" style="border:none">
        <table>
            <thead><tr><th>用户</th><th>邮箱</th><th>角色</th><th>积分</th><th>注册时间</th><th>操作</th></tr></thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="flex items-center justify-between mt-4">
      <span class="text-small" id="paginationInfo"></span>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm" id="prevBtn" onclick="prevPage()" disabled>上一页</button>
        <button class="btn btn-primary btn-sm" id="pageBtn">1</button>
        <button class="btn btn-outline btn-sm" id="nextBtn" onclick="nextPage()" disabled>下一页</button>
      </div>
    </div>
  </main>
</div>
<script>
let state = { page: 1, size: 10, total: 0, role: '' };

async function loadUsers() {
  const q = new URLSearchParams({ page: state.page, size: state.size });
  if (state.role) q.set('role', state.role);
  let d;
  try {
    d = await apiClient.get('/admin/users?' + q.toString());
  } catch (e) {
    showError(e.message || '加载失败')
    return
  }
  state.total = d.total;
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '';
  for (const u of d.items || []) {
    const self = u.id === (JSON.parse(localStorage.getItem('user') || 'null') || {}).id;
    const roleOpts = ['user','host','admin'].map(r => '<option value="' + r + '"' + (u.role === r ? ' selected' : '') + '>' + ({user:'普通用户',host:'房东',admin:'管理员'}[r]) + '</option>').join('');
    tbody.innerHTML += '<tr>'
      + '<td><div style="font-weight:500;font-size:0.875rem">' + escapeHtml(u.username) + '</div></td>'
      + '<td style="font-size:0.875rem;color:var(--fg-tertiary)">' + escapeHtml(u.email) + '</td>'
      + '<td><select class="input" style="width:auto;font-size:0.8125rem;padding:2px 24px 2px 8px" onchange="changeRole(\'' + u.id + '\',this.value)" ' + (self ? 'disabled' : '') + '>' + roleOpts + '</select></td>'
      + '<td>' + (u.score ?? '') + '</td>'
      + '<td style="font-size:0.875rem">' + (u.created_at || '').slice(0, 10) + '</td>'
      + '<td>' + (self ? '' : '<button class="btn btn-ghost btn-sm" style="font-size:0.75rem;padding:4px 10px;color:var(--danger)" onclick="deleteUser(\'' + u.id + '\')">删除</button>') + '</td>'
      + '</tr>';
  }
  if (!d.items || d.items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:var(--space-8);color:var(--fg-tertiary)">暂无数据</td></tr>';
  }
  document.getElementById('paginationInfo').textContent = '显示 ' + (d.items || []).length + ' / 共 ' + state.total + ' 位用户';
  document.getElementById('pageBtn').textContent = state.page;
  document.getElementById('prevBtn').disabled = state.page <= 1;
  document.getElementById('nextBtn').disabled = state.page * state.size >= state.total;
}

function switchRole() { state.role = document.getElementById('roleFilter').value; state.page = 1; loadUsers(); }
function prevPage() { if (state.page > 1) { state.page--; loadUsers(); } }
function nextPage() { if (state.page * state.size < state.total) { state.page++; loadUsers(); } }
async function changeRole(userId, role) {
  try {
    await apiClient.put('/admin/users/' + userId + '/role', { role });
  } catch (e) {
    showError('修改角色失败');
    loadUsers();
  }
}
async function deleteUser(userId) {
  if (!confirm('确定要删除此用户吗？')) return;
  try {
    await apiClient.delete('/admin/users/' + userId);
    loadUsers();
  } catch (e) {
    showError('删除失败');
  }
}
function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = ''; }
document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
