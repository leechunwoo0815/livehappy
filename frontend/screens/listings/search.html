<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>搜索房源 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.search-page{padding:var(--space-8) 0}
.search-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-6);margin-bottom:var(--space-6)}
.search-form .form-row{display:flex;gap:var(--space-4);flex-wrap:wrap}
.search-form .form-row .field{flex:1;min-width:180px}
.search-btn{height:44px;align-self:flex-end}
.listing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4)}
@media(max-width:900px){.listing-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.listing-grid{grid-template-columns:1fr}}
.listing-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);transition:all var(--transition-base)}
.listing-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.listing-card img{width:100%;height:200px;object-fit:cover}
.listing-card-body{padding:var(--space-4)}
.listing-card-title{font-size:1.0625rem;font-weight:600;margin-bottom:var(--space-1)}
.listing-card-city{font-size:0.8125rem;color:var(--fg-secondary);margin-bottom:var(--space-2)}
.listing-card-price{font-size:1.25rem;font-weight:700;color:var(--accent)}
.listing-card-price span{font-size:0.8125rem;font-weight:400;color:var(--fg-secondary)}
</style>
</head>
<body>
<nav class="nav" x-data>
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link active">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link">我的订单</a>
      <a href="/screens/messages/list.html" class="nav-link">消息</a>
      <a href="/screens/social/feed.html" class="nav-link">旅记</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">...</button>
      <template x-if="!$store.auth.loggedIn">
        <><a href="/screens/auth/login.html" class="btn btn-outline btn-sm">登录</a><a href="/screens/auth/register.html" class="btn btn-primary btn-sm">注册</a></>
      </template>
      <template x-if="$store.auth.loggedIn">
        <div class="flex items-center gap-2">
          <a href="/screens/users/profile.html" class="btn btn-ghost btn-sm" x-text="$store.auth.username"></a>
          <button class="btn btn-outline btn-sm" @click="$store.auth.logout()">退出</button>
        </div>
      </template>
    </div>
    <button class="nav-mobile-toggle" onclick="toggleMobileNav()" aria-label="菜单">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</nav>
<div class="mobile-nav" id="mobileNav">
  <a href="/screens/listings/search.html" onclick="toggleMobileNav()">搜索房源</a>
  <a href="/screens/bookings/list.html" onclick="toggleMobileNav()">我的订单</a>
  <a href="/screens/messages/list.html" onclick="toggleMobileNav()">消息</a>
  <a href="/screens/social/feed.html" onclick="toggleMobileNav()">旅记</a>
  <a href="/screens/ai/chat.html" onclick="toggleMobileNav()">AI 助手</a>
</div>

<div class="container search-page" x-data="searchApp()" x-init="init()">
  <h2 class="mb-6">搜索房源</h2>

  <form class="search-form" @submit.prevent="search()">
    <div class="form-row">
      <div class="field">
        <label class="field-label">城市</label>
        <input class="input" type="text" placeholder="如：北京、上海" x-model="query.city">
      </div>
      <div class="field">
        <label class="field-label">入住日期</label>
        <input class="input" type="date" x-model="query.checkIn">
      </div>
      <div class="field">
        <label class="field-label">离店日期</label>
        <input class="input" type="date" x-model="query.checkOut">
      </div>
      <div class="field">
        <label class="field-label">人数</label>
        <input class="input" type="number" min="1" placeholder="1" x-model="query.guests">
      </div>
      <button class="btn btn-primary search-btn" type="submit">搜索</button>
    </div>
  </form>

  <div x-show="!loaded" class="text-center py-8" style="color:var(--fg-secondary)">
    <p style="font-size:1.2rem;margin-bottom:var(--space-2)">🏠</p>
    <p>输入搜索条件查找房源</p>
  </div>

  <div x-show="loaded && listings.length === 0" class="text-center py-8" style="color:var(--fg-secondary)">
    <p style="font-size:2rem;margin-bottom:var(--space-2)">😕</p>
    <p>没有找到符合条件的房源</p>
  </div>

  <div class="listing-grid" x-show="listings.length > 0">
    <template x-for="listing in listings" :key="listing.id">
      <a :href="'/screens/listings/detail.html?id=' + listing.id" class="listing-card" style="text-decoration:none;color:inherit">
        <img :src="listing.cover_image || 'https://placehold.co/400x300/e2e8f0/64748b?text=No+Image'" :alt="listing.title">
        <div class="listing-card-body">
          <div class="listing-card-title" x-text="listing.title"></div>
          <div class="listing-card-city" x-text="listing.city"></div>
          <div class="listing-card-price"><span>¥</span><span x-text="listing.price_per_night"></span><span> / 晚</span></div>
        </div>
      </a>
    </template>
  </div>
</div>

<script>
function searchApp() {
  return {
    query: { city: '', checkIn: '', checkOut: '', guests: 1 },
    listings: [],
    loaded: false,
    async search() {
      const params = new URLSearchParams();
      if (this.query.city) params.set('city', this.query.city);
      if (this.query.guests) params.set('max_guests', this.query.guests);
      const res = await api('/api/listings/search?' + params.toString());
      if (res.ok) { this.listings = await res.json(); this.loaded = true }
    },
    init() {
      const params = new URLSearchParams(location.search);
      if (params.get('city')) this.query.city = params.get('city');
      if (params.get('guests')) this.query.guests = params.get('guests');
      if (params.get('city') || params.get('guests')) this.search();
    }
  }
}
</script>
</body>
</html>
