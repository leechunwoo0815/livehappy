<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>搜索房源 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.search-page{padding:var(--space-8) 0}
.search-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-6);margin-bottom:var(--space-6)}
.search-form .form-row{display:flex;gap:var(--space-4);flex-wrap:wrap}
.search-form .form-row .field{flex:1;min-width:180px}
.search-btn{height:44px;align-self:flex-end}
.listing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4)}
@media(max-width:900px){.listing-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.listing-grid{grid-template-columns:1fr}}
.listing-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);transition:all var(--transition-base)}
.listing-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.listing-card img{width:100%;height:200px;object-fit:cover}
.listing-card-body{padding:var(--space-4)}
.listing-card-title{font-size:1.0625rem;font-weight:600;margin-bottom:var(--space-1)}
.listing-card-city{font-size:0.8125rem;color:var(--fg-secondary);margin-bottom:var(--space-2)}
.listing-card-price{font-size:1.25rem;font-weight:700;color:var(--accent)}
.listing-card-price span{font-size:0.8125rem;font-weight:400;color:var(--fg-secondary)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link active">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a>
      <a href="/screens/messages/list.html" class="nav-link" data-auth-required>消息</a>
      <a href="/screens/social/feed.html" class="nav-link" data-auth-required>旅记</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div data-nav-auth></div>
    </div>
    <button class="nav-mobile-toggle" onclick="toggleMobileNav()" aria-label="菜单">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</nav>
<div class="mobile-nav" id="mobileNav">
  <a href="/screens/listings/search.html" onclick="toggleMobileNav()">搜索房源</a>
  <a href="/screens/bookings/list.html" onclick="toggleMobileNav()" data-auth-required>我的订单</a>
  <a href="/screens/messages/list.html" onclick="toggleMobileNav()" data-auth-required>消息</a>
  <a href="/screens/social/feed.html" onclick="toggleMobileNav()" data-auth-required>旅记</a>
  <a href="/screens/ai/chat.html" onclick="toggleMobileNav()" data-auth-required>AI 助手</a>
  <div data-nav-auth-mobile></div>
</div>

<div class="container search-page" id="searchApp">
  <h2 class="mb-6">搜索房源</h2>

  <form class="search-form" onsubmit="return searchListings()">
    <div class="form-row">
      <div class="field">
        <label class="field-label">城市</label>
        <input class="input" type="text" id="searchCity" placeholder="如：北京、上海">
      </div>
      <div class="field">
        <label class="field-label">入住日期</label>
        <input class="input" type="date" id="searchCheckIn">
      </div>
      <div class="field">
        <label class="field-label">离店日期</label>
        <input class="input" type="date" id="searchCheckOut">
      </div>
      <div class="field">
        <label class="field-label">人数</label>
        <input class="input" type="number" id="searchGuests" min="1" placeholder="1">
      </div>
      <button class="btn btn-primary search-btn" type="submit">搜索</button>
    </div>
  </form>

  <div id="searchPlaceholder" class="text-center py-8" style="color:var(--fg-secondary)">
    <p style="font-size:1.2rem;margin-bottom:var(--space-2)">🏠</p>
    <p>输入搜索条件查找房源</p>
  </div>

  <div id="searchEmpty" class="text-center py-8" style="color:var(--fg-secondary);display:none">
    <p style="font-size:2rem;margin-bottom:var(--space-2)">😕</p>
    <p>没有找到符合条件的房源</p>
  </div>

  <div class="listing-grid" id="searchResults" style="display:none"></div>
</div>

<script>
var searchState = { listings: [], loaded: false }

function searchListings() {
  var params = new URLSearchParams()
  var city = document.getElementById('searchCity').value
  var guests = document.getElementById('searchGuests').value
  if (city) params.set('city', city)
  if (guests) params.set('guests', guests)
  apiClient.get('/listings/search?' + params.toString()).then(function (data) {
    if (data) { searchState.listings = data; searchState.loaded = true; renderSearchResults(data) }
  }).catch(function () {})
  return false
}

function renderSearchResults(listings) {
  var container = document.getElementById('searchResults')
  var placeholder = document.getElementById('searchPlaceholder')
  var empty = document.getElementById('searchEmpty')
  placeholder.style.display = 'none'
  if (listings.length === 0) {
    empty.style.display = 'block'
    container.style.display = 'none'
    return
  }
  empty.style.display = 'none'
  container.style.display = 'grid'
  container.innerHTML = listings.map(function (l) {
    return '<a href="/screens/listings/detail.html?id=' + l.id + '" class="listing-card" style="text-decoration:none;color:inherit">' +
      '<img src="' + getCoverImage(l) + '" alt="' + escapeHtml(l.title) + '" onerror="var n=window.NO_IMAGE_URL;if(n)this.src=n" style="background:var(--surface-hover)">' +
      '<div class="listing-card-body">' +
      '<div class="listing-card-title">' + escapeHtml(l.title) + '</div>' +
      '<div class="listing-card-city">' + escapeHtml(l.city) + '</div>' +
      '<div class="listing-card-price"><span>¥</span>' + escapeHtml(String(l.price_per_night)) + '<span> / 晚</span></div>' +
      '</div></a>'
  }).join('')
}

document.addEventListener('DOMContentLoaded', function () {
  var params = new URLSearchParams(location.search)
  if (params.get('city')) { document.getElementById('searchCity').value = params.get('city') }
  if (params.get('guests')) { document.getElementById('searchGuests').value = params.get('guests') }
  if (params.get('city') || params.get('guests')) searchListings()
  else searchListings()
})
</script>
</body>
</html>
