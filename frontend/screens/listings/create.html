<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>发布房源 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.step-circle{width:28px;height:28px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:0.8125rem;font-weight:600}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links"><a href="search.html" class="nav-link">搜索房源</a><a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="createApp">
  <div class="container" style="max-width:640px">
    <div class="flex items-center gap-2 mb-6">
      <span class="badge badge-accent">房东中心</span>
      <h1 style="font-size:1.5rem">发布新房源</h1>
    </div>

    <div id="createError" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4)"></div>
    <div id="createSuccess" style="display:none" class="alert alert-success mb-4">
      <div><div style="font-weight:500">房源发布成功！等待平台审核</div></div>
    </div>

    <div class="card" id="createForm">
      <div class="flex gap-3 mb-6" style="font-size:0.875rem">
        <div class="flex items-center gap-2"><div class="step-circle" style="background:var(--accent);color:var(--white)">1</div><span style="font-weight:500">基本信息</span></div>
        <div class="flex items-center gap-2" style="color:var(--fg-tertiary)"><div class="step-circle" style="background:var(--border)">2</div><span>照片</span></div>
      </div>

      <div class="form-group">
        <label class="form-label">房源标题 <span style="color:var(--danger)">*</span></label>
        <input type="text" class="input" id="fTitle" placeholder="例如：西湖畔·湖景精品酒店">
      </div>
      <div class="form-group">
        <label class="form-label">城市 <span style="color:var(--danger)">*</span></label>
        <input type="text" class="input" id="fCity" placeholder="如：杭州">
      </div>
      <div class="form-group">
        <label class="form-label">详细地址</label>
        <input type="text" class="input" id="fAddress" placeholder="街道、门牌号">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="form-group">
          <label class="form-label">每晚价格 (¥) <span style="color:var(--danger)">*</span></label>
          <input type="number" class="input" id="fPrice" placeholder="588" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">最大住客数</label>
          <input type="number" class="input" id="fGuests" placeholder="2" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">卧室数</label>
          <input type="number" class="input" id="fBedrooms" placeholder="1" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">卫生间数</label>
          <input type="number" class="input" id="fBathrooms" placeholder="1" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">房源描述</label>
        <textarea class="input" id="fDescription" rows="4" placeholder="描述你的房源特色..."></textarea>
      </div>

      <div class="flex gap-3 mt-6">
        <button class="btn btn-outline flex-1" onclick="history.back()">取消</button>
        <button class="btn btn-primary flex-1" id="submitBtn" onclick="submitListing()">提交审核</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
})

function submitListing() {
  var title = document.getElementById('fTitle').value.trim()
  var city = document.getElementById('fCity').value.trim()
  var price = document.getElementById('fPrice').value
  var errEl = document.getElementById('createError')
  errEl.style.display = 'none'
  if (!title) { errEl.textContent = '请填写房源标题'; errEl.style.display = 'block'; return }
  if (!city) { errEl.textContent = '请填写城市'; errEl.style.display = 'block'; return }
  if (!price) { errEl.textContent = '请填写每晚价格'; errEl.style.display = 'block'; return }
  var btn = document.getElementById('submitBtn')
  btn.disabled = true; btn.textContent = '提交中...'
  apiClient.post('/listings/', {
    title: title, city: city,
    address: document.getElementById('fAddress').value || null,
    description: document.getElementById('fDescription').value || null,
    price_per_night: parseFloat(price),
    max_guests: parseInt(document.getElementById('fGuests').value) || 2,
    bedrooms: parseInt(document.getElementById('fBedrooms').value) || null,
    bathrooms: parseInt(document.getElementById('fBathrooms').value) || null
  }).then(function () {
    btn.disabled = false; btn.textContent = '提交审核'
    document.getElementById('createForm').style.display = 'none'; document.getElementById('createSuccess').style.display = 'block'
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = '提交审核'
    errEl.textContent = e.message; errEl.style.display = 'block'
  })
}
</script>
</body>
</html>
