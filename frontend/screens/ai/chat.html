<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 助手 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.chat-container{max-width:700px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;display:flex;flex-direction:column;height:70vh}
.chat-header{padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border);font-weight:600}
.chat-messages{flex:1;overflow-y:auto;padding:var(--space-4) var(--space-6)}
.chat-msg{margin-bottom:var(--space-4);max-width:80%}
.chat-msg-user{margin-left:auto}
.chat-msg-content{padding:var(--space-3) var(--space-4);border-radius:var(--radius-lg);font-size:0.9375rem;line-height:1.6}
.chat-msg-user .chat-msg-content{background:var(--accent);color:white;border-bottom-right-radius:var(--space-1)}
.chat-msg-assistant .chat-msg-content{background:color-mix(in srgb,var(--accent) 8%,var(--surface));border:1px solid var(--border);border-bottom-left-radius:var(--space-1)}
.chat-msg-time{font-size:0.6875rem;color:var(--fg-secondary);margin-top:var(--space-1);padding:0 var(--space-1)}
.chat-input{border-top:1px solid var(--border);padding:var(--space-4) var(--space-6);display:flex;gap:var(--space-3)}
.chat-input input{flex:1}
.typing{display:flex;gap:4px;padding:var(--space-3) var(--space-4)}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--fg-secondary);animation:typing 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.3}30%{opacity:1}}
</style>
</head>
<body>
<div class="container page" id="chatApp">
  <div class="chat-container">
    <div class="chat-header">🤖 AI 旅行助手</div>
    <div class="chat-messages" id="aiMessages"></div>
    <div class="chat-input">
      <input class="input" type="text" id="aiInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendAiMessage()">
      <button class="btn btn-primary" id="aiSendBtn" onclick="sendAiMessage()">发送</button>
    </div>
  </div>
</div>

<script>
var aiState = {
  messages: [{ role: 'assistant', content: '你好！我是开心住的 AI 旅行助手。我可以帮你推荐房源、规划行程、回答预订相关问题。有什么可以帮你的吗？', time: new Date().toLocaleTimeString() }],
  loading: false
}

document.addEventListener('DOMContentLoaded', function () {
  renderAiMessages()
})

function renderAiMessages() {
  var el = document.getElementById('aiMessages')
  el.innerHTML = aiState.messages.map(function (m) {
    return '<div class="chat-msg chat-msg-' + m.role + '">' +
      '<div class="chat-msg-content">' + escapeHtml(m.content) + '</div>' +
      '<div class="chat-msg-time">' + m.time + '</div></div>'
  }).join('')
  if (aiState.loading) {
    el.innerHTML += '<div class="chat-msg chat-msg-assistant"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>'
  }
  el.scrollTop = el.scrollHeight
}

function sendAiMessage() {
  var input = document.getElementById('aiInput')
  var text = input.value.trim()
  if (!text || aiState.loading) return
  aiState.messages.push({ role: 'user', content: text, time: new Date().toLocaleTimeString() })
  input.value = ''
  aiState.loading = true
  var btn = document.getElementById('aiSendBtn')
  btn.disabled = true; btn.textContent = '...'
  renderAiMessages()
  apiClient.post('/ai/chat', { content: text }).then(function (data) {
    aiState.loading = false; btn.disabled = false; btn.textContent = '发送'
    if (data) {
      aiState.messages.push({ role: 'assistant', content: data.reply, time: new Date().toLocaleTimeString() })
    } else {
      aiState.messages.push({ role: 'assistant', content: '抱歉，我暂时无法回答。请稍后再试。', time: new Date().toLocaleTimeString() })
    }
    renderAiMessages()
  }).catch(function () {
    aiState.loading = false; btn.disabled = false; btn.textContent = '发送'
    aiState.messages.push({ role: 'assistant', content: '抱歉，我暂时无法回答。请稍后再试。', time: new Date().toLocaleTimeString() })
    renderAiMessages()
  })
}
</script>
</body>
</html>
