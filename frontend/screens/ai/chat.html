<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 助手 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.chat-container{max-width:700px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;display:flex;flex-direction:column;height:70vh}
.chat-header{padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border);font-weight:600}
.chat-messages{flex:1;overflow-y:auto;padding:var(--space-4) var(--space-6)}
.chat-msg{margin-bottom:var(--space-4);max-width:80%}
.chat-msg-user{margin-left:auto}
.chat-msg-content{padding:var(--space-3) var(--space-4);border-radius:var(--radius-lg);font-size:0.9375rem;line-height:1.6}
.chat-msg-user .chat-msg-content{background:var(--accent);color:white;border-bottom-right-radius:var(--space-1)}
.chat-msg-assistant .chat-msg-content{background:color-mix(in srgb,var(--accent) 8%,var(--surface));border:1px solid var(--border);border-bottom-left-radius:var(--space-1)}
.chat-msg-time{font-size:0.6875rem;color:var(--fg-secondary);margin-top:var(--space-1);padding:0 var(--space-1)}
.chat-input{border-top:1px solid var(--border);padding:var(--space-4) var(--space-6);display:flex;gap:var(--space-3)}
.chat-input input{flex:1}
.typing{display:flex;gap:4px;padding:var(--space-3) var(--space-4)}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--fg-secondary);animation:typing 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.3}30%{opacity:1}}
</style>
</head>
<body>
<div class="container page" x-data="chatApp()" x-init="init()">
  <div class="chat-container">
    <div class="chat-header">🤖 AI 旅行助手</div>

    <div class="chat-messages" x-ref="messages">
      <template x-for="(msg, i) in messages" :key="i">
        <div class="chat-msg" :class="'chat-msg-' + msg.role">
          <div class="chat-msg-content" x-text="msg.content"></div>
          <div class="chat-msg-time" x-text="msg.time"></div>
        </div>
      </template>
      <div x-show="loading" class="chat-msg chat-msg-assistant">
        <div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      </div>
    </div>

    <div class="chat-input">
      <input class="input" type="text" placeholder="输入你的问题..." x-model="input" @keydown.enter="send()" :disabled="loading">
      <button class="btn btn-primary" @click="send()" :disabled="loading || !input.trim()" x-text="loading ? '...' : '发送'"></button>
    </div>
  </div>
</div>

<script>
function chatApp() {
  return {
    messages: [
      { role: 'assistant', content: '你好！我是开心住的 AI 旅行助手。我可以帮你推荐房源、规划行程、回答预订相关问题。有什么可以帮你的吗？', time: new Date().toLocaleTimeString() }
    ],
    input: '',
    loading: false,
    init() {
      this.$nextTick(() => this.scrollDown())
    },
    scrollDown() {
      this.$nextTick(() => { const el = this.$refs.messages; if (el) el.scrollTop = el.scrollHeight })
    },
    async send() {
      if (!this.input.trim() || this.loading) return
      const text = this.input.trim()
      this.messages.push({ role: 'user', content: text, time: new Date().toLocaleTimeString() })
      this.input = ''
      this.loading = true
      this.scrollDown()
      const res = await api('/api/ai/chat', { method: 'POST', body: JSON.stringify({ message: text }) })
      this.loading = false
      if (res.ok) {
        const data = await res.json()
        this.messages.push({ role: 'assistant', content: data.reply, time: new Date().toLocaleTimeString() })
      } else {
        this.messages.push({ role: 'assistant', content: '抱歉，我暂时无法回答。请稍后再试。', time: new Date().toLocaleTimeString() })
      }
      this.scrollDown()
    }
  }
}
</script>
</body>
</html>
