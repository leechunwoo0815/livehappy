<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>聊天 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.chat-container{display:flex;flex-direction:column;height:calc(100vh - var(--nav-height) - 120px);max-height:700px;border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;background:var(--surface)}
.chat-header{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border)}
.chat-messages{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4)}
.chat-msg{max-width:75%;padding:var(--space-3) var(--space-4);border-radius:var(--radius-lg);font-size:0.9375rem;line-height:1.6}
.chat-msg-self{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:var(--space-1)}
.chat-msg-other{background:var(--surface-hover);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:var(--space-1)}
.chat-msg-time{font-size:0.6875rem;color:var(--fg-tertiary);margin-top:var(--space-1)}
.chat-input-area{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border)}
.chat-input{flex:1;padding:12px 18px;border:1.5px solid var(--border);border-radius:var(--radius-full);background:var(--surface-hover);color:var(--fg);font-size:0.9375rem;outline:none}
.chat-input:focus{border-color:var(--accent);background:var(--surface)}
.chat-send{width:42px;height:42px;border-radius:var(--radius-full);background:var(--accent);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer}
.chat-send:hover{background:var(--accent-hover)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a>
      <a href="list.html" class="nav-link active" data-auth-required>消息</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
    </div>
  </div>
</nav>

<div class="page-sm" id="chatApp">
  <div class="container" style="max-width:720px">
    <a href="list.html" class="btn btn-ghost btn-sm mb-3" style="color:var(--fg-secondary)">← 返回消息列表</a>
    <div id="chatLoading" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>
    <div id="chatContent" style="display:none">
      <div class="chat-container">
        <div class="chat-header" id="chatHeader"></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <input class="chat-input" id="chatInput" type="text" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="chat-send" id="chatSendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var chatState = { convId: '', otherUser: '', messages: [], sending: false }

document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
  var user = getUser()
  chatState.convId = new URLSearchParams(location.search).get('id')
  if (!chatState.convId) {
    document.getElementById('chatLoading').textContent = '会话不存在'
    return
  }
  Promise.all([
    apiClient.get('/messages/conversations/' + chatState.convId + '/messages').catch(function () { return [] }),
    apiClient.get('/messages/conversations').catch(function () { return [] }),
    apiClient.post('/messages/conversations/' + chatState.convId + '/read', {})
  ]).then(function (results) {
    var msgs = results[0], convs = results[1]
    var conv = convs.find(function (c) { return c.id === chatState.convId })
    if (conv) chatState.otherUser = conv.participant_one === user.id ? conv.participant_two : conv.participant_one
    chatState.messages = msgs
    document.getElementById('chatLoading').style.display = 'none'
    document.getElementById('chatContent').style.display = 'block'
    document.getElementById('chatHeader').innerHTML =
      '<div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);font-size:0.8125rem">' +
      escapeHtml((chatState.otherUser || '?').charAt(0).toUpperCase()) + '</div>' +
      '<div><div style="font-weight:600;font-size:0.9375rem">' + escapeHtml(chatState.otherUser) + '</div></div>'
    renderMessages()
    scrollChat()
  })
})

function renderMessages() {
  var el = document.getElementById('chatMessages')
  var user = getUser()
  if (chatState.messages.length === 0) {
    el.innerHTML = '<div class="text-center py-4" style="color:var(--fg-secondary)">暂无消息，发送第一条消息吧</div>'
    return
  }
  el.innerHTML = chatState.messages.map(function (m) {
    var isSelf = m.sender_id === user.id
    return '<div>' +
      '<div class="chat-msg ' + (isSelf ? 'chat-msg-self' : 'chat-msg-other') + '">' + escapeHtml(m.content) + '</div>' +
      '<div class="chat-msg-time ' + (isSelf ? 'text-right' : '') + '">' + (m.created_at ? new Date(m.created_at).toLocaleString() : '') + '</div></div>'
  }).join('')
}

function scrollChat() {
  var el = document.getElementById('chatMessages')
  if (el) el.scrollTop = el.scrollHeight
}

function sendMessage() {
  if (chatState.sending) return
  var input = document.getElementById('chatInput')
  var text = input.value.trim()
  if (!text) return
  chatState.sending = true
  var btn = document.getElementById('chatSendBtn')
  btn.disabled = true
  apiClient.post('/messages/send', { receiver_id: chatState.otherUser, content: text }).then(function (msg) {
    chatState.sending = false; btn.disabled = false
    if (msg) {
      chatState.messages.push(msg)
      input.value = ''
      renderMessages()
      scrollChat()
    }
  }).catch(function () {
    chatState.sending = false; btn.disabled = false
    var el = document.getElementById('chatMessages')
    el.innerHTML += '<div class="text-center py-2" style="color:var(--danger);font-size:0.8125rem">消息发送失败，请重试</div>'
    el.scrollTop = el.scrollHeight
  })
}
</script>
</body>
</html>
