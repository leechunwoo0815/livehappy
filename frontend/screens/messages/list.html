<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>消息 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.conversation-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4);border-radius:var(--radius-lg);cursor:pointer;transition:all var(--transition-fast);text-decoration:none;color:inherit;border:1px solid transparent}
.conversation-item:hover{background:var(--surface-hover);border-color:var(--border)}
.conversation-item .content{flex:1;min-width:0}
.conversation-item .name{font-weight:500;font-size:0.9375rem;display:flex;align-items:center;gap:var(--space-2)}
.conversation-item .preview{font-size:0.875rem;color:var(--fg-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conversation-item .time{font-size:0.75rem;color:var(--fg-tertiary);flex-shrink:0}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link" data-auth-required>我的订单</a>
      <a href="list.html" class="nav-link active" data-auth-required>消息</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div data-nav-auth></div>
    </div>
  </div>
</nav>

<div class="page" id="convApp">
  <div class="container" style="max-width:720px">
    <h1 class="mb-6">消息</h1>
    <div id="convLoading" class="text-center py-8" style="color:var(--fg-secondary)">加载中...</div>
    <div id="convEmpty" class="text-center py-8" style="color:var(--fg-secondary);display:none">
      <p style="font-size:2rem;margin-bottom:var(--space-2)">💬</p>
      <p>暂无消息</p>
    </div>
    <div class="flex flex-col gap-2" id="convList"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
  var user = getUser()
  apiClient.get('/messages/conversations').then(function (convs) {
    document.getElementById('convLoading').style.display = 'none'
    if (!convs || convs.length === 0) {
      document.getElementById('convEmpty').style.display = 'block'
      return
    }
    var html = convs.map(function (c) {
      var other = c.participant_one === user.id ? c.participant_two : c.participant_one
      var unread = c.participant_one === user.id ? (c.unread_count_one || 0) : (c.unread_count_two || 0)
      var dot = unread > 0 ? '<span class="unread-dot"></span>' : ''
      return '<a href="chat.html?id=' + c.id + '" class="conversation-item">' +
        '<div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);font-size:0.8125rem">' + escapeHtml(other.charAt(0).toUpperCase()) + '</div>' +
        '<div class="content">' +
        '<div class="name"><span>' + escapeHtml(other) + '</span>' + dot + '</div>' +
        '<div class="preview">' + escapeHtml(c.last_message || '暂无消息') + '</div>' +
        '</div></a>'
    }).join('')
    document.getElementById('convList').innerHTML = html
  }).catch(function () {
    document.getElementById('convLoading').style.display = 'none'
  })
})
</script>
</body>
</html>
