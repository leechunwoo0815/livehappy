<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人主页 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">

<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.profile-card{max-width:500px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-8);text-align:center}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent-subtle);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto var(--space-4)}
.profile-name{font-size:1.25rem;font-weight:600;margin-bottom:var(--space-1)}
.profile-email{font-size:0.875rem;color:var(--fg-secondary);margin-bottom:var(--space-4)}
.profile-stats{display:flex;justify-content:center;gap:var(--space-8);margin-bottom:var(--space-6)}
.profile-stat-value{font-size:1.25rem;font-weight:600}
.profile-stat-label{font-size:0.75rem;color:var(--fg-secondary)}
</style>
</head>
<body>
<div class="container page" id="profileApp">
  <div id="profileLoading" class="text-center py-8">加载中...</div>
  <div id="profileContent" style="display:none"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!requireAuth()) return
  apiClient.get('/users/me').then(function (user) {
    if (!user) return
    document.getElementById('profileLoading').style.display = 'none'
    var html =
      '<div class="profile-card">' +
      '<div class="profile-avatar">' + escapeHtml((user.username || 'U').charAt(0).toUpperCase()) + '</div>' +
      '<div class="profile-name">' + escapeHtml(user.username) + '</div>' +
      '<div class="profile-email">' + escapeHtml(user.email) + '</div>' +
      '<div class="profile-stats">' +
      '<div><div class="profile-stat-value">' + (user.score || 0) + '</div><div class="profile-stat-label">积分</div></div>' +
      '</div>'
    if (user.bio) {
      html += '<div style="margin-bottom:var(--space-4);color:var(--fg-secondary);font-size:0.875rem">' + escapeHtml(user.bio) + '</div>'
    }
    html += '<div style="display:flex;gap:var(--space-2);justify-content:center">' +
      '<a href="/screens/bookings/list.html" class="btn btn-primary btn-sm">我的订单</a>' +
      '<a href="/screens/listings/create.html" class="btn btn-outline btn-sm">发布房源</a>' +
      '</div></div>'
    document.getElementById('profileContent').innerHTML = html
    document.getElementById('profileContent').style.display = 'block'
  }).catch(function () {
    document.getElementById('profileLoading').textContent = '加载失败'
  })
})
</script>
</body>
</html>
