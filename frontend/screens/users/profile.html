<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人主页 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.page{padding:var(--space-8) 0}
.profile-card{max-width:500px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-8);text-align:center}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent-subtle);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto var(--space-4)}
.profile-name{font-size:1.25rem;font-weight:600;margin-bottom:var(--space-1)}
.profile-email{font-size:0.875rem;color:var(--fg-secondary);margin-bottom:var(--space-4)}
.profile-stats{display:flex;justify-content:center;gap:var(--space-8);margin-bottom:var(--space-6)}
.profile-stat-value{font-size:1.25rem;font-weight:600}
.profile-stat-label{font-size:0.75rem;color:var(--fg-secondary)}
</style>
</head>
<body>
<div class="container page" x-data="profileApp()" x-init="init()">
  <div x-show="!loaded" class="text-center py-8">加载中...</div>

  <template x-if="loaded && user">
    <div class="profile-card">
      <div class="profile-avatar" x-text="user.username?.charAt(0)?.toUpperCase() || 'U'"></div>
      <div class="profile-name" x-text="user.username"></div>
      <div class="profile-email" x-text="user.email"></div>
      <div class="profile-stats">
        <div><div class="profile-stat-value" x-text="user.score || 0"></div><div class="profile-stat-label">积分</div></div>
      </div>
      <div x-show="user.bio" style="margin-bottom:var(--space-4);color:var(--fg-secondary);font-size:0.875rem" x-text="user.bio"></div>
      <div style="display:flex;gap:var(--space-2);justify-content:center">
        <a href="/screens/bookings/list.html" class="btn btn-primary btn-sm">我的订单</a>
        <a href="/screens/listings/create.html" class="btn btn-outline btn-sm">发布房源</a>
      </div>
    </div>
  </template>
</div>

<script>
function profileApp() {
  return {
    user: null,
    loaded: false,
    async init() {
      if (!$store.auth.loggedIn) { window.location.href = '/screens/auth/login.html?next=' + encodeURIComponent(location.pathname); return }
      const res = await api('/api/users/me');
      if (res.ok) { this.user = await res.json(); this.loaded = true }
    }
  }
}
</script>
</body>
</html>
