<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人主页 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-brand"><span class="nav-brand-icon">K</span>开心住</a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link">我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="container" style="max-width:720px">
    <div class="card text-center mb-6">
      <div class="avatar avatar-xl mx-auto" style="background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:var(--white);font-size:2rem">李</div>
      <h2 class="mt-4">李明</h2>
      <p style="font-size:0.9375rem;color:var(--fg-secondary)">li.ming@email.com · 加入于 2025年</p>
      <div class="flex justify-center gap-6 mt-4">
        <div class="text-center"><div style="font-weight:600;font-size:1.25rem">12</div><div style="font-size:0.8125rem;color:var(--fg-secondary)">旅程</div></div>
        <div class="text-center"><div style="font-weight:600;font-size:1.25rem">4.8</div><div style="font-size:0.8125rem;color:var(--fg-secondary)">评价均分</div></div>
        <div class="text-center"><div style="font-weight:600;font-size:1.25rem">8</div><div style="font-size:0.8125rem;color:var(--fg-secondary)">旅记</div></div>
      </div>
      <button class="btn btn-outline mt-6" onclick="alert('编辑资料')">编辑资料</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card card-hover" onclick="window.location.href='../bookings/list.html'" style="cursor:pointer">
        <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);color:var(--accent)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <h4 style="font-size:1rem">我的订单</h4>
        <p style="font-size:0.875rem;color:var(--fg-secondary)">查看和管理所有预订</p>
      </div>
      <div class="card card-hover" onclick="window.location.href='../reviews/list.html'" style="cursor:pointer">
        <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--accent-secondary-subtle);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);color:var(--accent-secondary)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <h4 style="font-size:1rem">我的评价</h4>
        <p style="font-size:0.875rem;color:var(--fg-secondary)">查看已写的评价</p>
      </div>
      <div class="card card-hover" onclick="window.location.href='../wishlist.html'">
        <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--success-subtle);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);color:var(--success)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <h4 style="font-size:1rem">收藏夹</h4>
        <p style="font-size:0.875rem;color:var(--fg-secondary)">收藏的房源和旅记</p>
      </div>
      <div class="card card-hover" onclick="window.location.href='../social/feed.html'">
        <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--info-subtle);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);color:var(--info)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </div>
        <h4 style="font-size:1rem">我的旅记</h4>
        <p style="font-size:0.875rem;color:var(--fg-secondary)">分享旅行故事</p>
      </div>
    </div>

    <div class="card">
      <h3 class="mb-4">个人资料</h3>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input type="text" class="input" value="李明">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="input" value="li.ming@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">手机号</label>
        <div class="input-group">
          <select class="input" style="max-width:100px;border-radius:var(--radius-md) 0 0 var(--radius-md)"><option>+86</option></select>
          <input type="tel" class="input" value="138****8888" style="border-left:none;border-radius:0 var(--radius-md) var(--radius-md) 0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">简介</label>
        <textarea class="input" rows="3">热爱旅行，喜欢探索各地的特色民宿和美食。已经通过开心住去过12个城市啦！</textarea>
      </div>
      <button class="btn btn-primary" onclick="alert('保存成功')">保存修改</button>
      <button class="btn btn-ghost ml-2" onclick="alert('修改密码')">修改密码</button>
    </div>
  </div>
</div>

<script>
(function() {
</script>
</body>
</html>
