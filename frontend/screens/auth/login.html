<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-6)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-10)}
.auth-header{text-align:center;margin-bottom:var(--space-8)}
.auth-header .logo{font-size:1.5rem;font-weight:700;font-family:var(--font-display);letter-spacing:-0.03em;color:var(--fg);text-decoration:none}
.auth-header .logo span{color:var(--accent)}
.auth-header p{color:var(--fg-secondary);font-size:0.875rem;margin-top:var(--space-2)}
.auth-error{padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4);display:none}
.auth-error.show{display:block}
.auth-footer{text-align:center;margin-top:var(--space-6);font-size:0.875rem;color:var(--fg-secondary)}
.auth-footer a{color:var(--accent)}
</style>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-header">
    <a href="/" class="logo">开心住 <span>LiveHappy</span></a>
    <p>欢迎回来，请登录你的账户</p>
  </div>
  <div class="auth-error" id="loginError"></div>
  <form id="loginForm" novalidate>
    <div class="field">
      <label class="field-label" for="email">邮箱</label>
      <input class="input" id="email" type="text" placeholder="name@example.com" required>
    </div>
    <div class="field">
      <label class="field-label" for="password">密码</label>
      <input class="input" id="password" type="password" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" required>
    </div>
    <button class="btn btn-primary w-full" id="loginBtn" type="submit">登录</button>
  </form>
  <div class="auth-footer">
    还没有账户？<a href="/screens/auth/register.html">立即注册</a>
  </div>
</div>
<script>
function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function showLoginError(msg) {
  var e = document.getElementById('loginError');
  e.textContent = msg;
  e.classList.add('show');
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var errDiv = document.getElementById('loginError');
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  errDiv.classList.remove('show');
  if (!email) { showLoginError('请输入邮箱地址'); return; }
  if (!validateEmail(email)) { showLoginError('邮箱格式不正确，请检查后重新输入'); return; }
  if (!password) { showLoginError('请输入密码'); return; }
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    var data = await apiClient.post('/auth/login', { email, password });
    localStorage.setItem('token', data.access_token);
    if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
    var userData = await apiClient.get('/users/me');
    localStorage.setItem('user', JSON.stringify(userData));
    var next = new URLSearchParams(location.search).get('next');
    if (next) { window.location.href = next; return; }
    var savedUser = JSON.parse(localStorage.getItem('user') || '{}');
    if (savedUser.role === 'admin') { window.location.href = '/screens/admin/dashboard.html'; return; }
    window.location.href = '/';
  } catch (err) {
    errDiv.textContent = translateError(err.message) || '登录失败，请稍后再试';
    errDiv.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = '登录';
});
</script>
</body>
</html>
