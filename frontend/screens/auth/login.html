<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-brand">
      <span class="nav-brand-icon">K</span>
      开心住
    </a>
    <div class="nav-links">
      <a href="/screens/listings/search.html" class="nav-link">搜索房源</a>
      <a href="/screens/bookings/list.html" class="nav-link">我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="parent.toggleTheme ? parent.toggleTheme() : toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="page-sm">
  <div class="container" style="max-width:420px">
    <div class="text-center mb-8">
      <div style="width:56px;height:56px;border-radius:var(--radius-xl);background:linear-gradient(135deg,var(--accent),var(--accent-secondary));display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);font-size:1.5rem;color:var(--white);font-family:var(--font-display);font-weight:600">K</div>
      <h1>欢迎回来</h1>
      <p style="font-size:0.9375rem">登录你的开心住账号</p>
    </div>

    <div class="card">
      <form hx-post="/api/auth/login" hx-target="#loginResult" hx-swap="innerHTML">
      <div class="form-group">
        <label class="form-label">邮箱 / 手机号</label>
        <input type="email" name="email" class="input" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <div class="flex items-center justify-between mb-2">
          <label class="form-label" style="margin-bottom:0">密码</label>
          <a href="#" class="text-small" style="color:var(--accent)">忘记密码？</a>
        </div>
        <div style="position:relative">
          <input type="password" name="password" class="input" placeholder="输入密码" style="padding-right:44px">
          <button style="position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:4px;color:var(--fg-tertiary)" onclick="togglePassword()" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">登录</button>
      <div id="loginResult" class="mt-4"></div>
      </form>
    </div>

    <p class="text-center mt-6" style="font-size:0.9375rem;color:var(--fg-secondary)">
      还没有账号？<a href="register.html" style="color:var(--accent);font-weight:500">立即注册</a>
    </p>

    <div style="margin-top:var(--space-8);padding-top:var(--space-6);border-top:1px solid var(--border)">
      <p class="text-center text-small">或使用以下方式登录</p>
      <div class="flex gap-3 mt-4" style="justify-content:center">
        <button class="btn btn-outline" style="flex:1;max-width:140px">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn btn-outline" style="flex:1;max-width:140px">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.62 5.98.54 7.13-.64 1.72-1.63 3.44-3.59 4.08M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25"/></svg>
          Apple
        </button>
        <button class="btn btn-outline" style="flex:1;max-width:140px">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          微信
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
function handleLogin() {
  const btn = document.querySelector('.btn-primary');
  const text = document.getElementById('loginText');
  const spinner = document.getElementById('loginSpinner');
  const err = document.getElementById('loginError');

  btn.disabled = true;
  text.style.display = 'none';
  spinner.style.display = 'block';
  err.style.display = 'none';

  setTimeout(() => {
    btn.disabled = false;
    text.style.display = 'block';
    spinner.style.display = 'none';
    const email = document.getElementById('email').value;
    if (!email) {
      document.getElementById('loginErrorText').textContent = '请输入邮箱或手机号';
      err.style.display = 'flex';
      return;
    }
    window.location.href = '../listings/search.html';
  }, 1200);
}
(function() {
  try {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch(e) {}
})();
</script>
</body>
</html>
