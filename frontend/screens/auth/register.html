<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>注册 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/htmx.min.js"></script>
<script src="/js/alpine.min.js" defer></script>
<script src="/js/app.js"></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-6)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-10)}
.auth-header{text-align:center;margin-bottom:var(--space-8)}
.auth-header .logo{font-size:1.5rem;font-weight:700;font-family:var(--font-display);letter-spacing:-0.03em;color:var(--fg);text-decoration:none}
.auth-header .logo span{color:var(--accent)}
.auth-header p{color:var(--fg-secondary);font-size:0.875rem;margin-top:var(--space-2)}
.auth-error{padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4);display:none}
.auth-error.show{display:block}
.auth-footer{text-align:center;margin-top:var(--space-6);font-size:0.875rem;color:var(--fg-secondary)}
.auth-footer a{color:var(--accent)}
</style>
</head>
<body class="auth-page">
<div class="auth-card" x-data="{ username: '', email: '', password: '', confirm: '', error: '', loading: false }">
  <div class="auth-header">
    <a href="/" class="logo">开心住 <span>LiveHappy</span></a>
    <p>创建你的开心住账户</p>
  </div>
  <div class="auth-error" :class="error ? 'show' : ''" x-text="error"></div>
  <form @submit.prevent="
    if (password !== confirm) { error = '两次密码不一致'; return }
    loading = true; error = '';
    const res = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ username, email, password }) });
    if (res.ok) {
      const data = await res.json();
      $store.auth.setToken(data.access_token);
      await $store.auth.fetchProfile();
      window.location.href = '/';
    } else {
      try { const e = await res.json(); error = e.detail || '注册失败'; } catch(_) { error = '注册失败' }
    }
    loading = false;
  ">
    <div class="field">
      <label class="field-label" for="username">用户名</label>
      <input class="input" id="username" type="text" placeholder="你的昵称" x-model="username" required>
    </div>
    <div class="field">
      <label class="field-label" for="email">邮箱</label>
      <input class="input" id="email" type="email" placeholder="your@email.com" x-model="email" required>
    </div>
    <div class="field">
      <label class="field-label" for="password">密码</label>
      <input class="input" id="password" type="password" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" x-model="password" required>
    </div>
    <div class="field">
      <label class="field-label" for="confirm">确认密码</label>
      <input class="input" id="confirm" type="password" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" x-model="confirm" required>
    </div>
    <button class="btn btn-primary w-full" type="submit" :disabled="loading" x-text="loading ? '注册中...' : '注册'"></button>
  </form>
  <div class="auth-footer">
    已有账户？<a href="/screens/auth/login.html">立即登录</a>
  </div>
</div>
</body>
</html>
