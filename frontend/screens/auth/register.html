<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>注册 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="/css/system.css">
<script src="/js/api-client.js"></script>
<script src="/js/app.js"></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-6)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-10)}
.auth-header{text-align:center;margin-bottom:var(--space-8)}
.auth-header .logo{font-size:1.5rem;font-weight:700;font-family:var(--font-display);letter-spacing:-0.03em;color:var(--fg);text-decoration:none}
.auth-header .logo span{color:var(--accent)}
.auth-header p{color:var(--fg-secondary);font-size:0.875rem;margin-top:var(--space-2)}
.auth-error{padding:var(--space-3);border-radius:var(--radius-md);background:var(--danger-subtle);color:var(--danger);font-size:0.8125rem;margin-bottom:var(--space-4);display:none}
.auth-error.show{display:block}
.auth-footer{text-align:center;margin-top:var(--space-6);font-size:0.875rem;color:var(--fg-secondary)}
.auth-footer a{color:var(--accent)}
</style>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-header">
    <a href="/" class="logo">开心住 <span>LiveHappy</span></a>
    <p>创建你的开心住账户</p>
  </div>
  <div class="auth-error" id="regError"></div>
  <form id="regForm" novalidate>
    <div class="field">
      <label class="field-label" for="username">用户名</label>
      <input class="input" id="username" type="text" placeholder="你的昵称" required minlength="2" maxlength="50">
    </div>
    <div class="field">
      <label class="field-label" for="email">邮箱</label>
      <input class="input" id="email" type="text" placeholder="name@example.com" required>
    </div>
    <div class="field">
      <label class="field-label" for="password">密码</label>
      <input class="input" id="password" type="password" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" required minlength="6">
    </div>
    <div class="field">
      <label class="field-label" for="confirm">确认密码</label>
      <input class="input" id="confirm" type="password" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" required>
    </div>
    <button class="btn btn-primary w-full" id="regBtn" type="submit">注册</button>
  </form>
  <div class="auth-footer">
    已有账户？<a href="/screens/auth/login.html">立即登录</a>
  </div>
</div>
<script>
function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function showRegError(msg) {
  var e = document.getElementById('regError');
  e.textContent = msg;
  e.classList.add('show');
}
document.getElementById('regForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('regBtn');
  var errDiv = document.getElementById('regError');
  var username = document.getElementById('username').value.trim();
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var confirm = document.getElementById('confirm').value;
  errDiv.classList.remove('show');
  if (!username) { showRegError('请输入用户名'); return; }
  if (username.length < 2) { showRegError('用户名至少2个字符'); return; }
  if (!email) { showRegError('请输入邮箱地址'); return; }
  if (!validateEmail(email)) { showRegError('邮箱格式不正确，请检查后重新输入'); return; }
  if (!password) { showRegError('请输入密码'); return; }
  if (password.length < 6) { showRegError('密码至少需要6个字符'); return; }
  if (password !== confirm) { showRegError('两次输入的密码不一致'); return; }
  btn.disabled = true;
  btn.textContent = '注册中...';
  try {
    var data = await apiClient.post('/auth/register', { username, email, password });
    localStorage.setItem('token', data.access_token);
    if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
    var userData = await apiClient.get('/users/me');
    localStorage.setItem('user', JSON.stringify(userData));
    var savedUser = JSON.parse(localStorage.getItem('user') || '{}');
    if (savedUser.role === 'admin') { window.location.href = '/screens/admin/dashboard.html'; return; }
    window.location.href = '/';
  } catch (err) {
    errDiv.textContent = translateError(err.message) || '注册失败，请稍后再试';
    errDiv.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = '注册';
});
</script>
</body>
</html>
