<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>注册 — 开心住 LiveHappy</title>
<link rel="stylesheet" href="../../css/system.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../../index.html" class="nav-brand">
      <span class="nav-brand-icon">K</span>
      开心住
    </a>
    <div class="nav-links">
      <a href="../listings/search.html" class="nav-link">搜索房源</a>
      <a href="../bookings/list.html" class="nav-link">我的订单</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="page-sm">
  <div class="container" style="max-width:480px">
    <div class="text-center mb-8">
      <h1>创建账号</h1>
      <p style="font-size:0.9375rem">加入开心住，开启你的旅程</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <div class="input-group">
          <select class="input" style="max-width:100px;border-radius:var(--radius-md) 0 0 var(--radius-md)">
            <option>+86</option>
            <option>+852</option>
            <option>+886</option>
          </select>
          <input type="tel" class="input" placeholder="手机号码" id="phone" style="border-left:none;border-radius:0 var(--radius-md) var(--radius-md) 0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="flex gap-2">
          <input type="text" class="input" placeholder="输入验证码" id="code" style="flex:1">
          <button class="btn btn-outline" onclick="sendCode(this)" style="flex-shrink:0;min-width:120px">获取验证码</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input type="text" class="input" placeholder="你的昵称" id="nickname">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱（选填）</label>
        <input type="email" class="input" placeholder="example@email.com" id="email">
      </div>
      <div class="form-group">
        <label class="form-label">设置密码</label>
        <input type="password" class="input" placeholder="至少8位，含字母和数字" id="password">
        <span class="form-help">密码需至少8位，包含字母和数字</span>
      </div>
      <div class="form-group flex items-start gap-2">
        <input type="checkbox" id="agree" style="width:16px;height:16px;accent-color:var(--accent);margin-top:3px">
        <label for="agree" style="font-size:0.875rem;color:var(--fg-secondary);line-height:1.5">
          我已阅读并同意 <a href="#" style="color:var(--accent)">服务条款</a> 和 <a href="#" style="color:var(--accent)">隐私政策</a>
        </label>
      </div>
      <button class="btn btn-primary w-full btn-lg" onclick="handleRegister()">注册</button>
      <div id="registerError" class="alert alert-danger mt-4" style="display:none">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
        <span id="registerErrorText">请完善注册信息</span>
      </div>
    </div>

    <p class="text-center mt-6" style="font-size:0.9375rem;color:var(--fg-secondary)">
      已有账号？<a href="login.html" style="color:var(--accent);font-weight:500">立即登录</a>
    </p>
  </div>
</div>

<script>
let codeTimer = null;
function sendCode(btn) {
  if (btn.disabled) return;
  let count = 60;
  btn.disabled = true;
  btn.textContent = `${count}s`;
  codeTimer = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(codeTimer);
      btn.disabled = false;
      btn.textContent = '重新获取';
    } else {
      btn.textContent = `${count}s`;
    }
  }, 1000);
}
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch(e) {}
}
function handleRegister() {
  const err = document.getElementById('registerError');
  err.style.display = 'none';
  if (!document.getElementById('phone').value) {
    document.getElementById('registerErrorText').textContent = '请输入手机号';
    err.style.display = 'flex'; return;
  }
  if (!document.getElementById('nickname').value) {
    document.getElementById('registerErrorText').textContent = '请输入昵称';
    err.style.display = 'flex'; return;
  }
  if (!document.getElementById('agree').checked) {
    document.getElementById('registerErrorText').textContent = '请同意服务条款';
    err.style.display = 'flex'; return;
  }
  window.location.href = '../listings/search.html';
}
(function() {
  try {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch(e) {}
})();
</script>
</body>
</html>
