services:
  postgres:
    image: postgres:16-alpine
    container_name: livehappy-postgres
    environment:
      POSTGRES_DB: stayhub
      POSTGRES_USER: stayhub
      POSTGRES_PASSWORD: stayhub123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stayhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: livehappy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: livehappy-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://stayhub:stayhub123@postgres:5432/stayhub"
      REDIS_URL: "redis://redis:6379/0"
      ELASTICSEARCH_ENABLED: "false"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: livehappy-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
