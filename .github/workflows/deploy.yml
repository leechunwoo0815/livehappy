name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push backend
        run: |
          docker build -f docker/Dockerfile.backend \
            -t ${{ secrets.ACR_REGISTRY }}/livehappy-backend:${{ github.sha }} \
            -t ${{ secrets.ACR_REGISTRY }}/livehappy-backend:latest \
            .

      - name: Build & Push frontend
        run: |
          docker build -f frontend/Dockerfile \
            -t ${{ secrets.ACR_REGISTRY }}/livehappy-frontend:${{ github.sha }} \
            -t ${{ secrets.ACR_REGISTRY }}/livehappy-frontend:latest \
            frontend

      - name: Push images
        run: |
          docker push ${{ secrets.ACR_REGISTRY }}/livehappy-backend --all-tags
          docker push ${{ secrets.ACR_REGISTRY }}/livehappy-frontend --all-tags

      - name: Deploy to ECS
        run: |
          ssh ${{ secrets.ECS_HOST }} "cd /opt/livehappy && \
            docker compose pull && \
            docker compose up -d --force-recreate && \
            docker compose exec -T backend alembic upgrade head"
