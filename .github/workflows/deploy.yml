name: Deploy

on:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push backend
        run: |
          docker build -f docker/Dockerfile.backend \
            -t livehappy-backend:${{ github.sha }} \
            -t livehappy-backend:latest \
            backend

      - name: Build & Push frontend
        run: |
          docker build -f frontend/Dockerfile \
            -t livehappy-frontend:${{ github.sha }} \
            -t livehappy-frontend:latest \
            frontend
